<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Test - YMovies</title>
    <style>
        /* Import Schkorycza Regular font */
        @font-face {
            font-family: 'Schkorycza Regular';
            src: url('/fonts/Schkorycza.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* Import Typogama Ahsing font */
        @font-face {
            font-family: 'Typogama Ahsing';
            src: url('/fonts/typogama-ahsing.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            background-color: #141414;
            color: white;
            padding: 2rem;
            font-family: Arial, sans-serif;
        }

        .logo-test {
            font-size: 3rem;
            font-weight: bold;
            margin: 1rem 0;
            color: #e50914;
        }

        .schkorycza {
            font-family: 'Schkorycza Regular', serif;
        }

        .typogama {
            font-family: 'Typogama Ahsing', serif;
        }

        .default {
            font-family: serif;
        }
    </style>
</head>
<body>
    <h1>YMovies Font Test</h1>
    
    <div class="logo-test schkorycza">
        YMovies (Schkorycza Regular)
    </div>
    
    <div class="logo-test typogama">
        YMovies (Typogama Ahsing)
    </div>
    
    <div class="logo-test default">
        YMovies (Default Serif)
    </div>

    <script>
        // Check if fonts are loaded
        document.fonts.ready.then(() => {
            console.log('All fonts loaded');
            document.fonts.forEach(font => {
                console.log(`Font: ${font.family}, Status: ${font.status}`);
            });
        });

        // Test font loading
        const schkoryczaFont = new FontFace('Schkorycza Regular', 'url(/fonts/Schkorycza.otf)');
        const typogamaFont = new FontFace('Typogama Ahsing', 'url(/fonts/typogama-ahsing.otf)');

        Promise.all([
            schkoryczaFont.load().then(() => console.log('Schkorycza loaded')).catch(e => console.error('Schkorycza failed:', e)),
            typogamaFont.load().then(() => console.log('Typogama loaded')).catch(e => console.error('Typogama failed:', e))
        ]);
    </script>
</body>
</html>
