
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamFlix - Netflix-style Movie App</title>
  <style>
    :root {
      --primary: #e50914;
      --background: #141414;
      --foreground: #ffffff;
      --card: #1f1f1f;
      --card-hover: #333333;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
    }
    
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 60px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8) 0%, transparent 100%);
      z-index: 100;
      transition: background-color 0.3s;
    }
    
    .navbar.scrolled {
      background-color: var(--background);
    }
    
    .navbar .logo {
      color: var(--primary);
      font-size: 2rem;
      font-weight: bold;
      text-decoration: none;
      position: relative;
    }
    
    .navbar .logo::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 0;
      height: 2px;
      background-color: var(--primary);
      transition: width 0.3s;
    }
    
    .navbar .logo:hover::after {
      width: 100%;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 80px 20px 40px;
    }
    
    .hero-banner {
      position: relative;
      height: 80vh;
      background-size: cover;
      background-position: center;
      margin-bottom: 30px;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 10s;
    }
    
    .hero-banner:hover {
      transform: scale(1.03);
    }
    
    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 60px;
    }
    
    .hero-title {
      font-size: 3.5rem;
      font-weight: bold;
      margin-bottom: 16px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      transition: transform 0.5s, opacity 0.5s;
      opacity: 0;
      transform: translateY(20px);
    }
    
    .hero-banner:hover .hero-title {
      opacity: 1;
      transform: translateY(0);
    }
    
    .hero-description {
      font-size: 1.2rem;
      max-width: 600px;
      margin-bottom: 30px;
      line-height: 1.5;
      transition: transform 0.5s 0.2s, opacity 0.5s 0.2s;
      opacity: 0;
      transform: translateY(20px);
    }
    
    .hero-banner:hover .hero-description {
      opacity: 1;
      transform: translateY(0);
    }
    
    .hero-buttons {
      display: flex;
      gap: 15px;
      transition: transform 0.5s 0.4s, opacity 0.5s 0.4s;
      opacity: 0;
      transform: translateY(20px);
    }
    
    .hero-banner:hover .hero-buttons {
      opacity: 1;
      transform: translateY(0);
    }
    
    .btn {
      padding: 10px 25px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background-color: var(--primary);
      color: white;
    }
    
    .btn-primary:hover {
      background-color: #f40612;
      transform: scale(1.05);
    }
    
    .btn-secondary {
      background-color: rgba(109, 109, 110, 0.7);
      color: white;
    }
    
    .btn-secondary:hover {
      background-color: rgba(109, 109, 110, 0.9);
      transform: scale(1.05);
    }
    
    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 16px;
      margin-left: 8px;
      transition: color 0.3s;
    }
    
    .movie-slider {
      margin-bottom: 40px;
      position: relative;
    }
    
    .movie-slider:hover .section-title {
      color: var(--primary);
    }
    
    .movie-slider:hover .section-title::after {
      content: '';
      display: block;
      width: 40px;
      height: 2px;
      background-color: var(--primary);
      margin-top: 4px;
      transition: width 0.3s;
    }
    
    .movie-container {
      display: flex;
      gap: 15px;
      overflow-x: auto;
      padding: 20px 0;
      scroll-behavior: smooth;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    .movie-container::-webkit-scrollbar {
      display: none;
    }
    
    .movie-card {
      flex: 0 0 auto;
      width: 200px;
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      transition: all 0.3s ease;
      transform-origin: center center;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
    
    .movie-card:hover {
      transform: scale(1.1);
      z-index: 10;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }
    
    .movie-poster {
      width: 100%;
      height: 300px;
      object-fit: cover;
      transition: filter 0.3s;
    }
    
    .movie-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 15px;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
      transform: translateY(100%);
      transition: transform 0.3s;
    }
    
    .movie-card:hover .movie-info {
      transform: translateY(0);
    }
    
    .movie-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .movie-meta {
      display: flex;
      font-size: 0.8rem;
      color: #aaa;
      gap: 10px;
    }
    
    .movie-rating {
      color: #46d369;
    }
    
    .movie-actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .icon-btn:hover {
      transform: scale(1.1);
      background-color: rgba(255, 255, 255, 0.3);
    }
    
    .icon-btn svg {
      width: 18px;
      height: 18px;
    }
    
    .slider-controls {
      position: absolute;
      top: 50%;
      width: 100%;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }
    
    .slider-btn {
      width: 50px;
      height: 100px;
      background-color: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: auto;
    }
    
    .movie-slider:hover .slider-btn {
      opacity: 1;
    }
    
    .slider-btn-left {
      border-top-right-radius: 4px;
      border-bottom-right-radius: 4px;
      transform: translateX(-20px);
    }
    
    .slider-btn-right {
      border-top-left-radius: 4px;
      border-bottom-left-radius: 4px;
      transform: translateX(20px);
    }
    
    .movie-slider:hover .slider-btn-left {
      transform: translateX(0);
    }
    
    .movie-slider:hover .slider-btn-right {
      transform: translateX(0);
    }
    
    .slider-btn svg {
      width: 30px;
      height: 30px;
      color: white;
    }
    
    .slider-btn:hover {
      background-color: rgba(0, 0, 0, 0.7);
    }
    
    /* Loading Skeletons */
    @keyframes pulse {
      0% {
        opacity: 0.6;
      }
      50% {
        opacity: 1;
      }
      100% {
        opacity: 0.6;
      }
    }
    
    .skeleton {
      animation: pulse 2s infinite ease-in-out;
      background-color: #333;
      border-radius: 4px;
    }
    
    .skeleton-banner {
      height: 80vh;
      margin-bottom: 30px;
    }
    
    .skeleton-title {
      height: 30px;
      width: 200px;
      margin-bottom: 16px;
    }
    
    .skeleton-card {
      width: 200px;
      height: 300px;
    }
    
    /* Onboarding Tutorial */
    .tutorial-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    
    .tutorial-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    
    .tutorial-content {
      background-color: #222;
      border-radius: 8px;
      width: 500px;
      max-width: 90%;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      position: relative;
      transform: translateY(20px);
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
    }
    
    .tutorial-overlay.active .tutorial-content {
      transform: translateY(0);
      opacity: 1;
    }
    
    .tutorial-close {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      transition: color 0.2s;
    }
    
    .tutorial-close:hover {
      color: white;
    }
    
    .tutorial-title {
      font-size: 1.5rem;
      margin-bottom: 15px;
    }
    
    .tutorial-desc {
      line-height: 1.6;
      margin-bottom: 25px;
      color: #ddd;
    }
    
    .tutorial-steps {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    
    .tutorial-step {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #555;
      margin: 0 5px;
    }
    
    .tutorial-step.active {
      background-color: var(--primary);
      width: 30px;
      border-radius: 10px;
    }
    
    .tutorial-footer {
      display: flex;
      justify-content: space-between;
    }
    
    .tutorial-footer .btn {
      padding: 8px 16px;
    }
    
    .highlight {
      position: relative;
      z-index: 1001;
      box-shadow: 0 0 0 4px var(--primary), 0 0 0 8px rgba(229, 9, 20, 0.3);
      border-radius: 4px;
      animation: highlight-pulse 2s infinite;
    }
    
    @keyframes highlight-pulse {
      0%, 100% {
        box-shadow: 0 0 0 4px var(--primary), 0 0 0 8px rgba(229, 9, 20, 0.3);
      }
      50% {
        box-shadow: 0 0 0 4px var(--primary), 0 0 0 12px rgba(229, 9, 20, 0.2);
      }
    }
    
    /* Loading indicator */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--background);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      transition: opacity 0.5s;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(229, 9, 20, 0.3);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 1s infinite linear;
      margin-bottom: 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      font-size: 1.2rem;
      color: #ddd;
      animation: pulse 1.5s infinite;
    }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading StreamFlix...</div>
  </div>
  
  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <a href="#" class="logo">StreamFlix</a>
  </nav>
  
  <div class="container">
    <!-- Hero Banner with loading skeleton -->
    <div class="hero-banner skeleton skeleton-banner" id="heroBanner">
      <div class="hero-overlay">
        <h1 class="hero-title" id="heroTitle"></h1>
        <p class="hero-description" id="heroDesc"></p>
        <div class="hero-buttons">
          <button class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            Play
          </button>
          <button class="btn btn-secondary">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
            More Info
          </button>
        </div>
      </div>
    </div>
    
    <!-- Trending Movies Section -->
    <div class="movie-slider" id="trendingSection">
      <h2 class="section-title skeleton skeleton-title" id="trendingTitle">Trending Now</h2>
      <div class="movie-container" id="trendingMovies">
        <!-- Skeleton loaders -->
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
      <div class="slider-controls">
        <div class="slider-btn slider-btn-left">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </div>
        <div class="slider-btn slider-btn-right">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
      </div>
    </div>
    
    <!-- Popular Movies Section -->
    <div class="movie-slider" id="popularSection">
      <h2 class="section-title skeleton skeleton-title" id="popularTitle">Popular on StreamFlix</h2>
      <div class="movie-container" id="popularMovies">
        <!-- Skeleton loaders -->
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
      <div class="slider-controls">
        <div class="slider-btn slider-btn-left">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </div>
        <div class="slider-btn slider-btn-right">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Onboarding Tutorial -->
  <div class="tutorial-overlay" id="tutorialOverlay">
    <div class="tutorial-content">
      <button class="tutorial-close" id="tutorialClose">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
      <h2 class="tutorial-title" id="tutorialTitle">Welcome to StreamFlix!</h2>
      <p class="tutorial-desc" id="tutorialDesc">Discover your next favorite movie with our personalized recommendations.</p>
      <div class="tutorial-steps" id="tutorialSteps">
        <span class="tutorial-step active"></span>
        <span class="tutorial-step"></span>
        <span class="tutorial-step"></span>
        <span class="tutorial-step"></span>
      </div>
      <div class="tutorial-footer">
        <button class="btn btn-secondary" id="tutorialSkip">Skip Tour</button>
        <button class="btn btn-primary" id="tutorialNext">Next</button>
      </div>
    </div>
  </div>
  
  <script>
    // Tutorial content for steps
    const tutorialSteps = [
      {
        title: "Welcome to StreamFlix!",
        desc: "Discover your next favorite movie with our personalized recommendations.",
        highlight: null
      },
      {
        title: "Movie Collections",
        desc: "Browse through trending and popular movies. Hover over any movie poster to see more details.",
        highlight: ".movie-card"
      },
      {
        title: "Watch Trailers",
        desc: "Click the play button to watch trailers and learn more about any movie.",
        highlight: ".btn-primary"
      },
      {
        title: "Ready to Start?",
        desc: "You're all set! Start exploring and enjoy the StreamFlix experience.",
        highlight: null,
        finalStep: true
      }
    ];
    
    // DOM elements
    const loadingScreen = document.getElementById('loadingScreen');
    const navbar = document.getElementById('navbar');
    const heroBanner = document.getElementById('heroBanner');
    const heroTitle = document.getElementById('heroTitle');
    const heroDesc = document.getElementById('heroDesc');
    const trendingTitle = document.getElementById('trendingTitle');
    const trendingMovies = document.getElementById('trendingMovies');
    const popularTitle = document.getElementById('popularTitle');
    const popularMovies = document.getElementById('popularMovies');
    
    // Tutorial elements
    const tutorialOverlay = document.getElementById('tutorialOverlay');
    const tutorialTitle = document.getElementById('tutorialTitle');
    const tutorialDesc = document.getElementById('tutorialDesc');
    const tutorialStepsEl = document.getElementById('tutorialSteps');
    const tutorialNext = document.getElementById('tutorialNext');
    const tutorialSkip = document.getElementById('tutorialSkip');
    const tutorialClose = document.getElementById('tutorialClose');
    
    // Current tutorial step
    let currentStep = 0;
    let highlightedElement = null;
    
    // Load data and remove loading screen
    window.addEventListener('DOMContentLoaded', () => {
      // Simulate loading delay
      setTimeout(() => {
        loadingScreen.style.opacity = '0';
        setTimeout(() => {
          loadingScreen.style.display = 'none';
          
          // Show tutorial after a slight delay
          setTimeout(() => {
            if (!localStorage.getItem('tutorialShown')) {
              showTutorial();
            }
          }, 1500);
        }, 500);
      }, 2000);
      
      // Load hero banner (featured movie)
      heroBanner.style.backgroundImage = "url('https://image.tmdb.org/t/p/original/suaEOtk1N1sgg2MTM7oZd2cfVp3.jpg')";
      heroBanner.classList.remove('skeleton');
      heroTitle.textContent = "Pulp Fiction";
      heroDesc.textContent = "The lives of two mob hitmen, a boxer, a gangster and his wife, and a pair of diner bandits intertwine in four tales of violence and redemption.";
      
      // Remove skeleton classes
      trendingTitle.classList.remove('skeleton', 'skeleton-title');
      popularTitle.classList.remove('skeleton', 'skeleton-title');
      
      // Fetch trending movies
      fetchTrendingMovies();
      
      // Fetch popular movies
      fetchPopularMovies();
    });
    
    // Navbar background change on scroll
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    });
    
    // Fetch trending movies and update UI
    async function fetchTrendingMovies() {
      try {
        const response = await fetch('/api/movies/trending');
        const movies = await response.json();
        
        // Clear skeleton loaders
        trendingMovies.innerHTML = '';
        
        // Add movie cards
        movies.forEach(movie => {
          trendingMovies.appendChild(createMovieCard(movie));
        });
      } catch (error) {
        console.error('Error fetching trending movies:', error);
      }
    }
    
    // Fetch popular movies and update UI
    async function fetchPopularMovies() {
      try {
        const response = await fetch('/api/movies/popular');
        const movies = await response.json();
        
        // Clear skeleton loaders
        popularMovies.innerHTML = '';
        
        // Add movie cards
        movies.forEach(movie => {
          popularMovies.appendChild(createMovieCard(movie));
        });
      } catch (error) {
        console.error('Error fetching popular movies:', error);
      }
    }
    
    // Create movie card element
    function createMovieCard(movie) {
      const card = document.createElement('div');
      card.className = 'movie-card';
      
      // Format date to year only
      const year = movie.release_date ? new Date(movie.release_date).getFullYear() : '';
      
      // Calculate vote percentage
      const votePercentage = Math.round(movie.vote_average * 10);
      
      card.innerHTML = `
        <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" alt="${movie.title}" class="movie-poster">
        <div class="movie-info">
          <h3 class="movie-title">${movie.title}</h3>
          <div class="movie-meta">
            <span class="movie-rating">${votePercentage}% Match</span>
            <span>${year}</span>
          </div>
          <div class="movie-actions">
            <button class="icon-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </button>
            <button class="icon-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            </button>
            <button class="icon-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            </button>
          </div>
        </div>
      `;
      
      return card;
    }
    
    // Tutorial functionality
    function showTutorial() {
      tutorialOverlay.classList.add('active');
      updateTutorialStep(0);
    }
    
    function hideTutorial() {
      tutorialOverlay.classList.remove('active');
      removeHighlight();
      localStorage.setItem('tutorialShown', 'true');
    }
    
    function updateTutorialStep(step) {
      // Remove previous highlight
      removeHighlight();
      
      // Update content
      const stepData = tutorialSteps[step];
      tutorialTitle.textContent = stepData.title;
      tutorialDesc.textContent = stepData.desc;
      
      // Update step indicators
      const steps = tutorialStepsEl.querySelectorAll('.tutorial-step');
      steps.forEach((el, i) => {
        el.classList.toggle('active', i === step);
      });
      
      // Add highlight if needed
      if (stepData.highlight) {
        const element = document.querySelector(stepData.highlight);
        if (element) {
          element.classList.add('highlight');
          highlightedElement = element;
        }
      }
      
      // Update button text for final step
      if (stepData.finalStep) {
        tutorialNext.textContent = 'Get Started';
      } else {
        tutorialNext.textContent = 'Next';
      }
    }
    
    function removeHighlight() {
      if (highlightedElement) {
        highlightedElement.classList.remove('highlight');
        highlightedElement = null;
      }
    }
    
    // Tutorial event listeners
    tutorialNext.addEventListener('click', () => {
      currentStep++;
      if (currentStep >= tutorialSteps.length) {
        hideTutorial();
      } else {
        updateTutorialStep(currentStep);
      }
    });
    
    tutorialSkip.addEventListener('click', hideTutorial);
    tutorialClose.addEventListener('click', hideTutorial);
    
    // Slider controls
    document.querySelectorAll('.slider-btn-right').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const container = e.target.closest('.movie-slider').querySelector('.movie-container');
        container.scrollBy({ left: container.clientWidth - 100, behavior: 'smooth' });
      });
    });
    
    document.querySelectorAll('.slider-btn-left').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const container = e.target.closest('.movie-slider').querySelector('.movie-container');
        container.scrollBy({ left: -(container.clientWidth - 100), behavior: 'smooth' });
      });
    });
  </script>
</body>
</html>
